<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PC Parts Rental - บริการเช่าอุปกรณ์คอมพิวเตอร์</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>PC Parts Rental</h1>

      <div style="display: flex; gap: 20px; align-items: center">
        <div id="auth-section">
          <button class="auth-btn" id="login-btn" onclick="showAuthModal()">
            เข้าสู่ระบบ
          </button>

          <div
            id="user-profile"
            style="display: none; align-items: center; gap: 10px"
          >
            <span>👤 <strong id="username-display">User</strong></span>
            <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
          </div>
        </div>

        <div id="cart-status">
          🛒 ตะกร้า:
          <span id="cart-count" style="font-weight: bold">0</span> ชิ้น
          <button onclick="showCartModal()">ดูตะกร้าสินค้า</button>
        </div>
      </div>
    </header>
    <div id="auth-overlay" onclick="handleAuthOverlayClick(event)">
      <div id="auth-modal">
        <div class="cart-modal-header">
          <h3 id="auth-title">เข้าสู่ระบบ</h3>
          <button class="modal-close-btn" onclick="closeAuthModal()">✕</button>
        </div>
        <div style="padding: 24px">
          <input
            type="text"
            id="auth-email"
            class="auth-input"
            placeholder="อีเมล"
          />
          <input
            type="password"
            id="auth-password"
            class="auth-input"
            placeholder="รหัสผ่าน"
          />

          <input
            type="text"
            id="auth-name"
            class="auth-input"
            placeholder="ชื่อ-นามสกุล"
            style="display: none"
          />

          <button
            class="confirm-btn"
            id="auth-submit-btn"
            onclick="processAuth()"
          >
            เข้าสู่ระบบ
          </button>

          <p
            style="
              text-align: center;
              margin-top: 16px;
              font-size: 14px;
              color: #666;
            "
          >
            <span id="auth-toggle-text">ยังไม่มีบัญชีใช่ไหม?</span>
            <a
              href="#"
              onclick="toggleAuthMode()"
              style="color: #000; font-weight: bold"
              >คลิกที่นี่</a
            >
          </p>
        </div>
      </div>
    </div>
    <div class="container">
      <h2>รายการอุปกรณ์ที่พร้อมให้เช่า</h2>
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" onclick="filterCategory('all', this)">
          ทั้งหมด
        </button>
      </div>
      <div class="product-grid" id="product-container">
        <p style="text-align: center; width: 100%">
          กำลังโหลดข้อมูลอุปกรณ์จาก Backend...
        </p>
      </div>
    </div>

    <!-- Cart Modal -->
    <div id="cart-overlay" onclick="handleOverlayClick(event)">
      <div id="cart-modal">
        <div class="cart-modal-header">
          <h3>🛒 ตะกร้าสินค้า (<span id="modal-count">0</span> ชิ้น)</h3>
          <button class="modal-close-btn" onclick="closeCartModal()">✕</button>
        </div>
        <div id="cart-items-list"></div>
        <div class="cart-modal-footer">
          <div class="cart-summary">
            <span>รวมทั้งหมด</span>
            <span><span id="modal-total">0</span> ชิ้น</span>
          </div>
          <button
            class="confirm-btn"
            id="confirm-btn"
            onclick="showConfirmDialog()"
          >
            ยืนยันการจอง
          </button>
        </div>
      </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirm-overlay" onclick="handleConfirmOverlayClick(event)">
      <div id="confirm-dialog">
        <p class="confirm-icon">✅</p>
        <h3>ยืนยันการจอง</h3>
        <p
          id="confirm-text"
          style="color: #666; font-size: 14px; margin: 8px 0 24px"
        ></p>
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="hideConfirmDialog()">
            ยกเลิก
          </button>
          <button class="btn-ok" onclick="confirmOrder()">ยืนยัน</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
      const EQUIPMENT_API = "http://127.0.0.1:3000/all-equipment";
      let cart = [];
      let allProducts = [];
      let activeCategory = "all";

      // Map category_id → ชื่อ (ตรงกับ DB)
      const CATEGORY_MAP = {
        101: "cpu",
        102: "ssd",
        103: "RAM",
        104: "Graphic Card",
        105: "Laptop",
        106: "wifi card",
        107: "อื่นๆ",
      };

      // --- ระบบ Filter Category ---
      function filterCategory(categoryId, btn) {
        activeCategory = categoryId;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderProducts();
      }

      function buildCategoryButtons() {
        const bar = document.getElementById("filter-bar");
        // หา category_id ที่มีจริงใน data
        const usedIds = [
          ...new Set(allProducts.map((p) => p.category_id).filter(Boolean)),
        ];
        bar.innerHTML = `<button class="filter-btn active" onclick="filterCategory('all', this)">ทั้งหมด</button>`;
        usedIds.forEach((id) => {
          const name = CATEGORY_MAP[id] || "category " + id;
          bar.innerHTML += `<button class="filter-btn" onclick="filterCategory(${id}, this)">${name}</button>`;
        });
      }

      function renderProducts() {
        const container = document.getElementById("product-container");
        const filtered =
          activeCategory === "all"
            ? allProducts
            : allProducts.filter((p) => p.category_id == activeCategory);

        if (filtered.length === 0) {
          container.innerHTML =
            '<p style="text-align:center;width:100%;color:#999;">ไม่มีอุปกรณ์ในหมวดนี้</p>';
          return;
        }

        container.innerHTML = "";
        filtered.forEach((product) => {
          const card = document.createElement("div");
          card.className = "product-card";
          const categoryName = product.category_name || "ทั่วไป";
          const brand = product.brand || "No Brand";
          const model = product.model || "";
          const dailyRate = product.daily_rate || 0;
          const equipmentId = product.equipment_id;
          const displayCategory =
            CATEGORY_MAP[product.category_id] ||
            product.category_name ||
            "ทั่วไป";

          // 💡 จุดที่เพิ่ม: ดึง URL รูปภาพ (เปลี่ยน 'Condition_' เป็นชื่อคอลัมน์จริงที่คุณส่งมาจาก Backend)
          // ถ้าไม่มีรูป ให้แสดงรูป Placeholder แทน
          const imageUrl =
            product.Condition_ ||
            product.image_url ||
            "https://placehold.co/400x250?text=No+Image";

          // 💡 จุดที่เพิ่ม: โครงสร้าง HTML ใหม่ที่รองรับรูปภาพ
          card.innerHTML = `
                    <img src="${imageUrl}" alt="${brand} ${model}" class="product-image" onerror="this.src='https://placehold.co/400x250?text=Image+Error'">
                    <div class="product-info-wrapper">
                        <div>
                            <div class="product-category">${displayCategory}</div>
                            <h3 class="product-name">${brand} ${model}</h3>
                        </div>
                        <div>
                            <div class="product-price">฿${Number(dailyRate).toLocaleString()} / วัน</div>
                            <button class="rent-btn" onclick="addToCart('${equipmentId}')">เลือกเช่าอุปกรณ์นี้</button>
                        </div>
                    </div>
                `;
          container.appendChild(card);
        });
      }

      // --- ระบบตะกร้า ---
      function addToCart(equipmentId) {
        const product = allProducts.find((p) => p.equipment_id == equipmentId);
        const exists = cart.find((item) => item.equipment_id == equipmentId);
        if (exists) {
          showToast("อุปกรณ์ชิ้นนี้อยู่ในตะกร้าแล้วครับ");
        } else {
          cart.push(product);
          updateCartUI();
          showToast("เพิ่ม " + product.brand + " " + product.model + " แล้ว");
        }
      }

      function removeFromCart(index) {
        const name = cart[index].brand + " " + cart[index].model;
        cart.splice(index, 1);
        updateCartUI();
        renderCartItems();
        showToast("ลบ " + name + " ออกแล้ว");
      }

      function updateCartUI() {
        document.getElementById("cart-count").innerText = cart.length;
      }

      // --- Modal ---
      function showCartModal() {
        renderCartItems();
        document.getElementById("cart-overlay").classList.add("open");
      }

      function closeCartModal() {
        document.getElementById("cart-overlay").classList.remove("open");
      }

      function handleOverlayClick(e) {
        if (e.target === e.currentTarget) closeCartModal();
      }

      function renderCartItems() {
        const list = document.getElementById("cart-items-list");
        document.getElementById("modal-count").textContent = cart.length;
        document.getElementById("modal-total").textContent = cart.length;
        document.getElementById("confirm-btn").disabled = cart.length === 0;

        if (cart.length === 0) {
          list.innerHTML =
            '<div class="cart-empty">ตะกร้ายังว่างอยู่ครับ<br>เลือกอุปกรณ์ที่ต้องการก่อนนะ</div>';
          return;
        }

        list.innerHTML = cart
          .map(
            (item, i) => `
                <div class="cart-item-row">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.brand} ${item.model}</div>
                        <div class="cart-item-meta">${CATEGORY_MAP[item.category_id] || item.category_name || "ทั่วไป"} · ฿${Number(item.daily_rate).toLocaleString()}/วัน</div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${i})">ลบ</button>
                </div>
            `,
          )
          .join("");
      }

      // --- Confirm Dialog ---
      function showConfirmDialog() {
        if (cart.length === 0) return;
        document.getElementById("confirm-text").textContent =
          "คุณต้องการจองอุปกรณ์ทั้งหมด " + cart.length + " ชิ้น ใช่หรือไม่?";
        document.getElementById("confirm-overlay").classList.add("open");
      }

      function hideConfirmDialog() {
        document.getElementById("confirm-overlay").classList.remove("open");
      }

      function handleConfirmOverlayClick(e) {
        if (e.target === e.currentTarget) hideConfirmDialog();
      }

      async function confirmOrder() {
        // 1. ตรวจสอบว่าล็อกอินหรือยัง
        const userStr = localStorage.getItem("user");
        if (!userStr) {
          alert("กรุณาเข้าสู่ระบบก่อนสั่งจองครับ");
          showAuthModal(); // เปิดหน้าต่าง Login
          return;
        }

        const user = JSON.parse(userStr);
        const userId = user.user_id; // หรือ user.User_ID ตามที่ Database คุณใช้

        if (cart.length === 0) {
          alert("ตะกร้าว่างเปล่า กรุณาเลือกสินค้าก่อนครับ");
          return;
        }

        try {
          // 2. ตรวจสอบว่า User นี้เคยกรอกข้อมูล Customer หรือยัง
          // โดยเรียก API ที่เราคุยกันไว้ก่อนหน้า (หรือใช้ API ที่เช็คจาก User_ID)
          const response = await fetch(
            `http://localhost:3000/get-customer-profile/${userId}`,
          );
          const customerData = await response.json();

          // เก็บข้อมูลตะกร้าลง LocalStorage เพื่อใช้ในหน้าถัดไป
          localStorage.setItem("cartData", JSON.stringify(cart));

          if (customerData.notFound) {
            // ถ้ายังไม่มีข้อมูลลูกค้า -> ไปหน้ากรอกชื่อ/เบอร์โทร
            alert("กรุณากรอกข้อมูลผู้เช่าก่อนทำรายการครับ");
            window.location.href = "customer.html?fromCart=true";
          } else {
            // ถ้ามีข้อมูลแล้ว -> ไปหน้าเปิดบิลเช่าได้เลย
            localStorage.setItem("customer_id", customerData.customer_id);
            window.location.href = "rental.html";
          }
        } catch (error) {
          console.error("Error checking customer:", error);
          alert("เกิดข้อผิดพลาดในการตรวจสอบข้อมูลลูกค้า");
        }
      }

      // --- Toast ---
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      // --- ดึงข้อมูลจาก Backend ---
      async function fetchEquipment() {
        const container = document.getElementById("product-container");
        try {
          const response = await fetch(EQUIPMENT_API);
          if (!response.ok) throw new Error("ไม่สามารถดึงข้อมูลได้");

          const rawData = await response.json();

          if (Array.isArray(rawData)) allProducts = rawData;
          else if (rawData && rawData.data) allProducts = rawData.data;
          else allProducts = [rawData];

          if (allProducts.length === 0) {
            container.innerHTML =
              '<p style="text-align:center;width:100%;">ยังไม่มีข้อมูลอุปกรณ์ในระบบ</p>';
            return;
          }

          buildCategoryButtons();
          renderProducts();
        } catch (error) {
          console.error("Error:", error);
          container.innerHTML = `<p class="error-msg">❌ โหลดข้อมูลไม่สำเร็จ: เช็คการรัน Backend (node app.js)</p>`;
        }
      }

      fetchEquipment();

      // --- ระบบ User Authentication ---
      let isLoginMode = true;
      let currentUser = null; // เก็บข้อมูล user ที่ล็อกอิน

      // ตรวจสอบสถานะตอนโหลดหน้าเว็บ
      function checkLoginStatus() {
        const savedUser = localStorage.getItem("user");
        if (savedUser) {
          currentUser = JSON.parse(savedUser);

          // ซ่อนปุ่มเข้าสู่ระบบ แสดงโปรไฟล์
          document.getElementById("login-btn").style.display = "none";
          document.getElementById("user-profile").style.display = "flex";
          document.getElementById("username-display").textContent =
            currentUser.username;

          // 💡 เช็ค Role ว่าเป็น Admin หรือไม่
          if (currentUser.role === "admin") {
            // ถ้าเป็นแอดมิน อาจจะแสดงปุ่ม "จัดการระบบหลังบ้าน" เพิ่มขึ้นมา
            if (!document.getElementById("admin-btn")) {
              const adminBtn = document.createElement("button");
              adminBtn.id = "admin-btn";
              adminBtn.textContent = "⚙️ จัดการระบบ";
              adminBtn.className = "auth-btn";
              adminBtn.onclick = () =>
                (window.location.href = "admin-dashboard.html");
              document.getElementById("user-profile").prepend(adminBtn);
            }
          }
        } else {
          document.getElementById("login-btn").style.display = "block";
          document.getElementById("user-profile").style.display = "none";
          const adminBtn = document.getElementById("admin-btn");
          if (adminBtn) adminBtn.remove();
        }
      }

      function showAuthModal() {
        document.getElementById("auth-overlay").classList.add("open");
      }

      function closeAuthModal() {
        document.getElementById("auth-overlay").classList.remove("open");
      }

      function handleAuthOverlayClick(e) {
        if (e.target === e.currentTarget) closeAuthModal();
      }

      function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("auth-title").textContent = isLoginMode
          ? "เข้าสู่ระบบ"
          : "สมัครสมาชิก";
        document.getElementById("auth-submit-btn").textContent = isLoginMode
          ? "เข้าสู่ระบบ"
          : "สมัครสมาชิก";
        document.getElementById("auth-toggle-text").textContent = isLoginMode
          ? "ยังไม่มีบัญชีใช่ไหม?"
          : "มีบัญชีอยู่แล้วใช่ไหม?";
        document.getElementById("auth-name").style.display = isLoginMode
          ? "none"
          : "block";
      }

      async function processAuth() {
        const email = document.getElementById("auth-email").value;
        const password = document.getElementById("auth-password").value;
        const name = document.getElementById("auth-name").value;

        if (!email || !password) {
          showToast("กรุณากรอกอีเมลและรหัสผ่าน");
          return;
        }

        try {
          const endpoint = isLoginMode ? "/login" : "/register";
          // 💡 เปลี่ยน URL ให้ตรงกับ Backend ของคุณ
          const res = await fetch("http://127.0.0.1:3000" + endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password, name }),
          });

          const data = await res.json();

          if (!res.ok) {
            // ถ้า Backend ส่ง error กลับมา ให้แจ้งเตือน
            showToast("❌ " + (data.error || "เกิดข้อผิดพลาด"));
            return;
          }

          if (isLoginMode) {
            // กรณี Login สำเร็จ ให้เก็บข้อมูลลง LocalStorage
            localStorage.setItem("user", JSON.stringify(data.user));
            currentUser = data.user;
            checkLoginStatus();
            closeAuthModal();
            showToast("เข้าสู่ระบบสำเร็จ! 🎉");
          } else {
            // กรณี Register สำเร็จ ให้สลับไปหน้า Login อัตโนมัติ
            showToast("สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ 🎉");
            toggleAuthMode();
          }

          // เคลียร์ค่าในช่องกรอก
          document.getElementById("auth-email").value = "";
          document.getElementById("auth-password").value = "";
          document.getElementById("auth-name").value = "";
        } catch (err) {
          console.error(err);
          showToast("❌ เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์");
        }
      }

      function logout() {
        localStorage.removeItem("user");
        currentUser = null;
        checkLoginStatus();
        showToast("ออกจากระบบแล้ว");

        // ล้างตะกร้าสินค้าเมื่อออกจากระบบ (Optional)
        cart = [];
        updateCartUI();
      }

      // เรียกใช้ตอนโหลดหน้าเว็บ
      checkLoginStatus();
    </script>
  </body>
</html>
