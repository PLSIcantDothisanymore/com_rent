<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PC Parts Rental - บริการเช่าอุปกรณ์คอมพิวเตอร์</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .header-actions {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .btn-danger {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-secondary {
        background-color: #6c757d;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-primary {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PC Parts Rental</h1>
      <div class="header-actions">
        <div id="auth-status"></div>

        <div id="cart-status">
          🛒 ตะกร้า:
          <span id="cart-count" style="font-weight: bold">0</span> ชิ้น
          <button class="btn-primary" onclick="showCartModal()">
            ดูตะกร้าสินค้า
          </button>
        </div>
      </div>
    </header>

    <div class="container">
      <h2>รายการอุปกรณ์ที่พร้อมให้เช่า</h2>
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" onclick="filterCategory('all', this)">
          ทั้งหมด
        </button>
      </div>
      <div class="product-grid" id="product-container">
        <p style="text-align: center; width: 100%">
          กำลังโหลดข้อมูลอุปกรณ์จาก Backend...
        </p>
      </div>
    </div>

    <div id="cart-overlay" onclick="handleOverlayClick(event)">
      <div id="cart-modal">
        <div class="cart-modal-header">
          <h3>🛒 ตะกร้าสินค้า (<span id="modal-count">0</span> ชิ้น)</h3>
          <button class="modal-close-btn" onclick="closeCartModal()">✕</button>
        </div>
        <div id="cart-items-list"></div>
        <div class="cart-modal-footer">
          <div class="cart-summary">
            <span>รวมทั้งหมด</span>
            <span><span id="modal-total">0</span> ชิ้น</span>
          </div>
          <button
            class="confirm-btn"
            id="confirm-btn"
            onclick="showConfirmDialog()"
          >
            ยืนยันการจอง
          </button>
        </div>
      </div>
    </div>

    <div id="confirm-overlay" onclick="handleConfirmOverlayClick(event)">
      <div id="confirm-dialog">
        <p class="confirm-icon">✅</p>
        <h3>ยืนยันการจอง</h3>
        <p
          id="confirm-text"
          style="color: #666; font-size: 14px; margin: 8px 0 24px"
        ></p>
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="hideConfirmDialog()">
            ยกเลิก
          </button>
          <button class="btn-ok" onclick="doConfirm()">ยืนยัน</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const EQUIPMENT_API = "http://127.0.0.1:3000/all-equipment";
      let cart = [];
      let allProducts = [];
      let activeCategory = "all";

      // Map category_id → ชื่อ (ตรงกับ DB)
      const CATEGORY_MAP = {
        101: "cpu",
        102: "ssd",
        103: "RAM",
        104: "Graphic Card",
        105: "Laptop",
        106: "wifi card",
        107: "อื่นๆ",
      };

      // 🟢 1. ตรวจสอบสถานะการ Login ทันทีที่โหลดหน้า
      function checkLoginStatus() {
        const userId = localStorage.getItem("user_id");
        const authDiv = document.getElementById("auth-status");

        if (userId) {
          // ถ้าล็อคอินแล้ว ให้แสดงปุ่มแก้โปรไฟล์และออกจากระบบ
          authDiv.innerHTML = `
                    <button class="btn-secondary" onclick="window.location.href='customer.html'">แก้ไขข้อมูลส่วนตัว</button>
                    <button class="btn-danger" onclick="logout()">ออกจากระบบ</button>
                `;
        } else {
          // ถ้ายังไม่ล็อคอิน ให้แสดงปุ่มเข้าสู่ระบบ
          authDiv.innerHTML = `
                    <button class="btn-primary" onclick="window.location.href='login.html'">เข้าสู่ระบบ</button>
                `;
        }
      }

      // 🟢 2. ฟังก์ชันออกจากระบบ
      function logout() {
        localStorage.removeItem("user_id");
        localStorage.removeItem("customer_id");
        alert("ออกจากระบบเรียบร้อยแล้ว");
        window.location.reload();
      }

      checkLoginStatus(); // เรียกใช้งานทันที

      // --- ระบบ Filter Category ---
      function filterCategory(categoryId, btn) {
        activeCategory = categoryId;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderProducts();
      }

      function buildCategoryButtons() {
        const bar = document.getElementById("filter-bar");
        const usedIds = [
          ...new Set(allProducts.map((p) => p.category_id).filter(Boolean)),
        ];
        bar.innerHTML = `<button class="filter-btn active" onclick="filterCategory('all', this)">ทั้งหมด</button>`;
        usedIds.forEach((id) => {
          const name = CATEGORY_MAP[id] || "category " + id;
          bar.innerHTML += `<button class="filter-btn" onclick="filterCategory(${id}, this)">${name}</button>`;
        });
      }

      function renderProducts() {
        const container = document.getElementById("product-container");
        const filtered =
          activeCategory === "all"
            ? allProducts
            : allProducts.filter((p) => p.category_id == activeCategory);

        if (filtered.length === 0) {
          container.innerHTML =
            '<p style="text-align:center;width:100%;color:#999;">ไม่มีอุปกรณ์ในหมวดนี้</p>';
          return;
        }

        container.innerHTML = "";
        filtered.forEach((product) => {
          const card = document.createElement("div");
          card.className = "product-card";
          const categoryName = product.category_name || "ทั่วไป";
          const brand = product.brand || "No Brand";
          const model = product.model || "";
          const dailyRate = product.daily_rate || 0;
          const equipmentId = product.equipment_id;
          const displayCategory =
            CATEGORY_MAP[product.category_id] ||
            product.category_name ||
            "ทั่วไป";
          card.innerHTML = `
                    <div>
                        <div class="product-category">${displayCategory}</div>
                        <h3 class="product-name">${brand} ${model}</h3>
                    </div>
                    <div>
                        <div class="product-price">฿${Number(dailyRate).toLocaleString()} / วัน</div>
                        <button class="rent-btn" onclick="addToCart('${equipmentId}')">เลือกเช่าอุปกรณ์นี้</button>
                    </div>
                `;
          container.appendChild(card);
        });
      }

      // --- ระบบตะกร้า ---
      function addToCart(equipmentId) {
        const product = allProducts.find((p) => p.equipment_id == equipmentId);
        const exists = cart.find((item) => item.equipment_id == equipmentId);
        if (exists) {
          showToast("อุปกรณ์ชิ้นนี้อยู่ในตะกร้าแล้วครับ");
        } else {
          cart.push(product);
          updateCartUI();
          showToast("เพิ่ม " + product.brand + " " + product.model + " แล้ว");
        }
      }

      function removeFromCart(index) {
        const name = cart[index].brand + " " + cart[index].model;
        cart.splice(index, 1);
        updateCartUI();
        renderCartItems();
        showToast("ลบ " + name + " ออกแล้ว");
      }

      function updateCartUI() {
        document.getElementById("cart-count").innerText = cart.length;
      }

      // --- Modal ---
      function showCartModal() {
        renderCartItems();
        document.getElementById("cart-overlay").classList.add("open");
      }

      function closeCartModal() {
        document.getElementById("cart-overlay").classList.remove("open");
      }

      function handleOverlayClick(e) {
        if (e.target === e.currentTarget) closeCartModal();
      }

      function renderCartItems() {
        const list = document.getElementById("cart-items-list");

        // ต้องเพิ่มโค้ดนี้เพื่อไม่ให้ error ถ้า list หาไม่เจอ (แต่กรณีนี้มีใน HTML แล้ว)
        if (cart.length === 0) {
          list.innerHTML =
            '<div class="cart-empty">ตะกร้ายังว่างอยู่ครับ<br>เลือกอุปกรณ์ที่ต้องการก่อนนะ</div>';
          document.getElementById("modal-count").textContent = 0;
          document.getElementById("modal-total").textContent = 0;
          document.getElementById("confirm-btn").disabled = true;
          return;
        }

        document.getElementById("modal-count").textContent = cart.length;
        document.getElementById("modal-total").textContent = cart.length;
        document.getElementById("confirm-btn").disabled = false;

        list.innerHTML = cart
          .map(
            (item, i) => `
                <div class="cart-item-row">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.brand} ${item.model}</div>
                        <div class="cart-item-meta">${CATEGORY_MAP[item.category_id] || item.category_name || "ทั่วไป"} · ฿${Number(item.daily_rate).toLocaleString()}/วัน</div>
                    </div>
                    <button class="delete-btn" onclick="removeFromCart(${i})" title="ลบ">🗑</button>
                </div>
            `,
          )
          .join("");
      }

      // --- Confirm Dialog ---
      function showConfirmDialog() {
        if (cart.length === 0) return;
        document.getElementById("confirm-text").textContent =
          "คุณต้องการจองอุปกรณ์ทั้งหมด " + cart.length + " ชิ้น ใช่หรือไม่?";
        document.getElementById("confirm-overlay").classList.add("open");
      }

      function hideConfirmDialog() {
        document.getElementById("confirm-overlay").classList.remove("open");
      }

      function handleConfirmOverlayClick(e) {
        if (e.target === e.currentTarget) hideConfirmDialog();
      }

      // 🟢 3. แก้ไขฟังก์ชันยืนยันการทำรายการให้ฉลาดขึ้น!
      // 🟢 3. แก้ไขฟังก์ชันยืนยันการทำรายการให้รับข้อมูลตรงกับ Backend
      async function doConfirm() {
        const userId = localStorage.getItem("user_id");

        // 3.1 เช็คว่าเข้าสู่ระบบหรือยัง
        if (!userId) {
          alert("กรุณาเข้าสู่ระบบก่อนทำการเช่า");
          window.location.href = "login.html"; // เด้งไปหน้า login
          return;
        }

        // 3.2 บันทึกข้อมูลตะกร้าลง LocalStorage
        let totalAmount = 0;
        cart.forEach((item) => (totalAmount += Number(item.daily_rate)));
        localStorage.setItem("cartTotalAmount", totalAmount);
        localStorage.setItem("cartData", JSON.stringify(cart));

        hideConfirmDialog();
        closeCartModal();

        // 3.3 เช็คว่าเคยกรอกข้อมูล Profile (Customer) หรือยัง
        try {
          // เปลี่ยน IP เป็น localhost ให้ตรงกันเพื่อป้องกันปัญหา
          const res = await fetch(
            `http://localhost:3000/check-customer/${userId}`,
          );
          const data = await res.json();

          // 🟢 แก้ให้ตรงกับหลังบ้าน (ใช้ data.exists แทน data.hasProfile)
          if (data.exists === true) {
            // ถ้ามีประวัติแล้ว ให้จำ customer_id ไว้ แล้วข้ามไปหน้าเช่าหลัก
            localStorage.setItem("customer_id", data.customer.customer_id);
            console.log("พบประวัติลูกค้า ไปหน้าเช่าต่อได้เลย");
            window.location.href = "rental.html"; // เปลี่ยนชื่อไฟล์ตรงนี้ให้ตรงกับหน้าเช่าของคุณนะครับ
          } else {
            // ถ้ายังไม่เคยกรอกชื่อ-เบอร์โทร ให้ไปหน้า customer.html
            alert("กรุณากรอกข้อมูลส่วนตัวครั้งแรกก่อนเริ่มทำการเช่า");
            window.location.href = "customer.html";
          }
        } catch (error) {
          console.error("ตรวจสอบข้อมูลลูกค้าล้มเหลว", error);
          alert(
            "ระบบขัดข้อง ไม่สามารถตรวจสอบข้อมูลลูกค้าได้ โปรดตรวจสอบเซิร์ฟเวอร์",
          );
        }
      }

      // --- Toast ---
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      // --- ดึงข้อมูลจาก Backend ---
      async function fetchEquipment() {
        const container = document.getElementById("product-container");
        try {
          const response = await fetch(EQUIPMENT_API);
          if (!response.ok) throw new Error("ไม่สามารถดึงข้อมูลได้");

          const rawData = await response.json();

          if (Array.isArray(rawData)) allProducts = rawData;
          else if (rawData && rawData.data) allProducts = rawData.data;
          else allProducts = [rawData];

          if (allProducts.length === 0) {
            container.innerHTML =
              '<p style="text-align:center;width:100%;">ยังไม่มีข้อมูลอุปกรณ์ในระบบ</p>';
            return;
          }

          buildCategoryButtons();
          renderProducts();
        } catch (error) {
          console.error("Error:", error);
          container.innerHTML = `<p class="error-msg">❌ โหลดข้อมูลไม่สำเร็จ: เช็คการรัน Backend (node app.js)</p>`;
        }
      }

      fetchEquipment();
    </script>
  </body>
</html>
