<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ชำระเงิน - PC Parts Rental</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .readonly-input {
        background-color: #f0f0f0;
        color: #555;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PC Parts Rental - หน้าชำระเงิน</h1>
    </header>

    <div class="container" style="max-width: 500px; margin-top: 40px">
      <div class="product-card" style="padding: 30px">
        <h2>กรอกข้อมูลการชำระเงิน</h2>
        <form id="paymentForm">
          <div class="form-group">
            <label>รหัสการเช่า (Rental ID)</label>
            <input type="text" id="rental_id" class="readonly-input" readonly />
          </div>
          <div class="form-group">
            <label>ยอดชำระทั้งหมด (รวมค่าเช่า)</label>
            <input
              type="number"
              id="payment_amount"
              class="readonly-input"
              readonly
            />
          </div>
          <div class="form-group">
            <label>วันที่ชำระเงิน</label>
            <input type="date" id="payment_date" required />
          </div>
          <div class="form-group">
            <label>ช่องทางการชำระเงิน</label>
            <select id="payment_method" required>
              <option value="">-- เลือกช่องทาง --</option>
              <option value="Bank Transfer">
                โอนเงินผ่านธนาคาร (Bank Transfer)
              </option>
              <option value="Credit Card">บัตรเครดิต</option>
              <option value="Cash">เงินสด</option>
            </select>
          </div>

          <button
            type="submit"
            class="rent-btn"
            style="background-color: #28a745"
          >
            ยืนยันการชำระเงิน (เสร็จสิ้น)
          </button>
        </form>
      </div>
    </div>

    <script>
      // ดึงข้อมูลที่ฝากไว้มาแสดงอัตโนมัติ
      const totalAmount = localStorage.getItem("cartTotalAmount") || 0;
      const rentalId = localStorage.getItem("currentRentalId") || "";

      document.getElementById("payment_amount").value = totalAmount;
      document.getElementById("rental_id").value = rentalId;
      document.getElementById("payment_date").valueAsDate = new Date();

      if (!rentalId) {
        alert("ไม่พบข้อมูลบิลเช่าหลัก กรุณาทำรายการใหม่");
        window.location.href = "index.html";
      }

      document
        .getElementById("paymentForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          // จำลองรหัส Payment (ตามใน Database ของคุณ PAY-XXX หรือเลขรัน)
          const generatedPaymentId =
            "PAY-" + Math.floor(100 + Math.random() * 900);

          const paymentData = {
            payment_id: generatedPaymentId,
            payment_date: document.getElementById("payment_date").value,
            payment_amount: document.getElementById("payment_amount").value,
            payment_method: document.getElementById("payment_method").value,
            payment_proof: "NULL",
            rental_id: document.getElementById("rental_id").value,
          };

          try {
            const response = await fetch("http://127.0.0.1:3000/add-Payments", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(paymentData),
            });

            if (response.ok) {
              alert("✅ ชำระเงินเรียบร้อยแล้ว! ขอบคุณที่ใช้บริการครับ");

              // ล้างข้อมูลในความจำทั้งหมด เพราะทำรายการเสร็จแล้ว
              localStorage.removeItem("cartTotalAmount");
              localStorage.removeItem("cartData");
              localStorage.removeItem("currentRentalId");

              // เด้งกลับหน้าแรก
              window.location.href = "index.html";
            } else {
              const result = await response.json();
              alert("เกิดข้อผิดพลาด: " + result.errorDetail);
            }
          } catch (error) {
            alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้");
          }
        });
    </script>
  </body>
</html>
