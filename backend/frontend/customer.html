<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>ข้อมูลส่วนตัว - PC Parts rental</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container" style="max-width: 500px; margin-top: 50px">
      <div class="product-card" style="padding: 30px">
        <h2>ข้อมูลลูกค้า (customer Profile)</h2>
        <form id="customerForm" style="text-align: left">
          <div style="margin-bottom: 15px">
            <label>ชื่อ-นามสกุล (Full Name) *</label>
            <input
              type="text"
              id="cust_name"
              style="width: 100%; padding: 8px; box-sizing: border-box"
              required
            />
          </div>
          <div style="margin-bottom: 15px">
            <label>เบอร์โทรศัพท์ (cust_phone) *</label>
            <input
              type="text"
              id="cust_phone"
              style="width: 100%; padding: 8px; box-sizing: border-box"
              required
            />
          </div>
          <button
            type="button"
            onclick="saveCustomer()"
            style="
              width: 100%;
              padding: 10px;
              background: #28a745;
              color: white;
              border: none;
              cursor: pointer;
              border-radius: 6px;
              font-size: 14px;
              font-weight: 600;
            "
          >
            บันทึกข้อมูล
          </button>
        </form>
      </div>
    </div>

    <script>
      const userId = localStorage.getItem("user_id");
      if (!userId) {
        alert("กรุณาเข้าสู่ระบบก่อน");
        window.location.href = "login.html";
      }

      // เช็คว่ามาจากไหน: ?from=cart = มาจากกดยืนยันจอง, ไม่มี = มาแก้โปรไฟล์เอง
      const urlParams = new URLSearchParams(window.location.search);
      const cameFromCart = urlParams.get("from") === "cart";

      // ดึงข้อมูลเดิมมา pre-fill ในฟอร์ม
      async function loadProfile() {
        try {
          const res = await fetch(
            `http://localhost:3000/check-customer/${userId}`,
          );
          const data = await res.json();
          if (data.exists && data.customer) {
            document.getElementById("cust_name").value =
              data.customer.cust_name || "";
            document.getElementById("cust_phone").value =
              data.customer.cust_phone || "";
          }
        } catch (err) {
          console.error("โหลดข้อมูลไม่ได้:", err);
        }
      }
      loadProfile();

      async function saveCustomer() {
        const cust_name = document.getElementById("cust_name").value.trim();
        const cust_phone = document.getElementById("cust_phone").value.trim();

        if (!cust_name || !cust_phone) {
          alert("กรุณากรอกข้อมูลให้ครบถ้วน");
          return;
        }

        const payload = {
          cust_name: cust_name,
          cust_phone: cust_phone,
          user_id: userId,
        };

        try {
          const res = await fetch("http://localhost:3000/save-customer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (res.ok) {
            const data = await res.json();
            if (data.cust_id) {
              localStorage.setItem("cust_id", data.cust_id);
            }
            alert("บันทึกข้อมูลสำเร็จ!");
            // ถ้ามาจากตะกร้า → ไปหน้า Rentals ต่อ
            // ถ้ามาแก้โปรไฟล์เอง → กลับหน้าแรก
            if (cameFromCart) {
              window.location.href = "rental.html";
            } else {
              window.location.href = "index.html";
            }
          } else {
            const err = await res.json();
            alert("เกิดข้อผิดพลาด: " + err.message);
          }
        } catch (error) {
          console.error("Error:", error);
          alert("ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้");
        }
      }
    </script>
  </body>
</html>
