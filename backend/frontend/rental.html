<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างใบสั่งเช่า - PC Parts Rental</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; 
        }
        /* คลาสสำหรับช่องที่ล็อคไว้ไม่ให้พิมพ์ */
        .readonly-input { background-color: #e9ecef; color: #495057; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>PC Parts Rental - เปิดบิลเช่าอุปกรณ์</h1>
        <button onclick="window.location.href='index.html'" style="padding: 10px 20px; cursor: pointer;">ยกเลิก / กลับหน้าแรก</button>
    </header>

    <div class="container" style="max-width: 500px; margin-top: 40px;">
        <div class="product-card" style="padding: 30px;">
            <h2>รายละเอียดการเช่า (บิลหลัก)</h2>
            <form id="rentalForm">
                <div class="form-group">
                    <label>รหัสลูกค้า (Customer ID) 🔒</label>
                    <input type="text" id="customer_id" class="readonly-input" readonly required>
                </div>
                <div class="form-group">
                    <label>วันที่สั่งเช่า (Order Date)</label>
                    <input type="date" id="order_date" required>
                </div>
                <div class="form-group">
                    <label>ยอดรวมค่าเช่า (Total Amount)</label>
                    <input type="number" id="total_amount" class="readonly-input" readonly>
                </div>
                <div class="form-group">
                    <label>ค่ามัดจำ (Total Deposit)</label>
                    <input type="number" id="total_deposit" value="1000" required>
                </div>
                <div class="form-group">
                    <label>สถานะการชำระเงิน (Payment Status)</label>
                    <input type="text" id="payment_status" value="Pending" class="readonly-input" readonly>
                </div>
                <button type="submit" class="rent-btn" style="background-color: #007bff;">เปิดบิล & เลือกระยะเวลาเช่า ➔</button>
            </form>
        </div>
    </div>

    <script>
        // 🟢 1. ตรวจสอบว่ามีรหัสลูกค้าในระบบหรือยัง
        const customerId = localStorage.getItem('customer_id');
        if (!customerId) {
            alert("ไม่พบข้อมูลลูกค้า กรุณาเข้าสู่ระบบหรืออัปเดตข้อมูลส่วนตัวก่อนครับ");
            window.location.href = "index.html";
        } else {
            // เอาคำมาใส่ในช่องให้อัตโนมัติ
            document.getElementById('customer_id').value = customerId;
        }

        // 🟢 2. ดึงยอดรวมจากตะกร้ามาแสดง
        const totalAmount = localStorage.getItem('cartTotalAmount') || 0;
        document.getElementById('total_amount').value = totalAmount;

        // 🟢 3. เซ็ตวันที่สั่งเช่าเป็นวันนี้อัตโนมัติ
        document.getElementById('order_date').valueAsDate = new Date();

        // 🟢 4. เมื่อกดปุ่ม "เปิดบิล"
        document.getElementById('rentalForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // จำลองสร้างรหัสการเช่า (เช่น 50100XXXXX) ให้ตรงกับฟอร์แมตใน Database
            const generatedRentalId = "50100" + Math.floor(10000 + Math.random() * 90000);

            const rentalData = {
                rental_id: generatedRentalId,
                order_date: document.getElementById('order_date').value,
                total_amount: document.getElementById('total_amount').value,
                total_deposit: document.getElementById('total_deposit').value,
                payment_status: document.getElementById('payment_status').value,
                customer_id: document.getElementById('customer_id').value
            };

            try {
                // ส่งข้อมูลไปที่ API
                const response = await fetch('http://localhost:3000/add-rental', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(rentalData)
                });

                if (response.ok) {
                    alert("บันทึกใบสั่งเช่าสำเร็จ! รหัส: " + generatedRentalId);
                    
                    // ฝากรหัสการเช่าไว้ให้หน้า detail ใช้ต่อ
                    localStorage.setItem('currentRentalId', generatedRentalId);
                    
                    // เด้งไปหน้าระบุวันเช่า
                    window.location.href = "detail.html"; 
                } else {
                    const result = await response.json();
                    alert("เกิดข้อผิดพลาด: " + result.errorDetail);
                }
            } catch (error) {
                alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้: โปรดตรวจสอบว่ารัน Node.js อยู่หรือไม่");
            }
        });
    </script>
</body>
</html>
