<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สร้างใบสั่งเช่า - PC Parts rental</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
      }
      /* คลาสสำหรับช่องที่ล็อคไว้ไม่ให้พิมพ์ */
      .readonly-input {
        background-color: #e9ecef;
        color: #495057;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PC Parts rental - เปิดบิลเช่าอุปกรณ์</h1>
      <button
        onclick="window.location.href = 'index.html'"
        style="padding: 10px 20px; cursor: pointer"
      >
        ยกเลิก / กลับหน้าแรก
      </button>
    </header>

    <div class="container" style="max-width: 500px; margin-top: 40px">
      <div class="product-card" style="padding: 30px">
        <h2>รายละเอียดการเช่า (บิลหลัก)</h2>
        <form id="rentalForm">
          <div class="form-group">
            <label>รหัสลูกค้า (customer ID) 🔒</label>
            <input
              type="text"
              id="cust_id"
              class="readonly-input"
              readonly
              required
            />
          </div>
          <div class="form-group">
            <label>วันที่สั่งเช่า (Order Date)</label>
            <input type="date" id="rental_order_date" required />
          </div>
          <div class="form-group">
            <label>ยอดรวมค่าเช่า (Total Amount)</label>
            <input
              type="number"
              id="rental_total_amount"
              class="readonly-input"
              readonly
            />
          </div>
          <div class="form-group">
            <label>ค่ามัดจำ (Total equip_deposit)</label>
            <input
              type="number"
              id="rental_total_deposit"
              value="1000"
              required
            />
          </div>
          <div class="form-group">
            <label>สถานะการชำระเงิน (payment equip_status)</label>
            <input
              type="text"
              id="rental_payment_status"
              value="Pending"
              class="readonly-input"
              readonly
            />
          </div>
          <button
            type="submit"
            class="rent-btn"
            style="background-color: #007bff"
          >
            เปิดบิล & เลือกระยะเวลาเช่า ➔
          </button>
        </form>
      </div>
    </div>

    <script>
      // ดึงข้อมูลที่ฝากไว้มาแสดงอัตโนมัติ
      const userId = localStorage.getItem("user_id");
      const custId = localStorage.getItem("cust_id");
      const totalAmount = localStorage.getItem("cartTotalAmount") || 0;

      if (!userId || !custId) {
        alert("ไม่พบข้อมูลลูกค้า กรุณาเข้าสู่ระบบหรือกรอกข้อมูลส่วนตัวก่อน");
        window.location.href = "index.html";
      }

      document.getElementById("cust_id").value = custId;
      document.getElementById("rental_total_amount").value = totalAmount;
      document.getElementById("rental_order_date").valueAsDate = new Date();

      document
        .getElementById("rentalForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          // 1. นำการสุ่ม ID ออก และไม่ส่ง rental_id ไปใน payload
          const rentalData = {
            rental_order_date:
              document.getElementById("rental_order_date").value,
            rental_total_amount:
              Number(document.getElementById("rental_total_amount").value) || 0,
            rental_total_deposit:
              Number(document.getElementById("rental_total_deposit").value) ||
              0,
            rental_payment_status: document.getElementById(
              "rental_payment_status",
            ).value,
            cust_id: Number(document.getElementById("cust_id").value),
          };

          try {
            const response = await fetch("http://localhost:3000/add-rental", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(rentalData),
            });

            // 2. แปลง response เป็น JSON ทันที เพื่อดึง ID ที่ Backend สร้างให้
            const result = await response.json();

            if (response.ok) {
              // Backend returns { message: "...", rental_id: newId }
              const newRentalId = result.rental_id;

              if (newRentalId === undefined || newRentalId === null) {
                alert(
                  "เกิดข้อผิดพลาด: เซิร์ฟเวอร์ไม่ได้ส่งรหัสการเช่ากลับมา (ID is missing)",
                );
                console.error("Full result from server:", result);
                return;
              }

              alert("บันทึกใบสั่งเช่าสำเร็จ! รหัส: " + newRentalId);

              // ฝากรหัสการเช่า (ที่ได้จากฐานข้อมูล) ไว้ให้หน้า detail ใช้ต่อ
              localStorage.setItem("currentRentalId", newRentalId.toString());

              // เด้งไปหน้าระบุวันเช่า
              window.location.href = "detail.html";
            } else {
              alert(
                "เกิดข้อผิดพลาด: " + (result.errorDetail || result.message),
              );
            }
          } catch (error) {
            alert(
              "ไม่สามารถติดต่อเซิร์ฟเวอร์ได้: โปรดตรวจสอบว่ารัน Node.js อยู่หรือไม่",
            );
          }
        });
    </script>
  </body>
</html>
