<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบุวันเช่าอุปกรณ์ - PC Parts rental</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }
      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .item-list {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PC Parts rental - ระบุวันที่ต้องการเช่า</h1>
    </header>

    <div class="container" style="max-width: 500px; margin-top: 40px">
      <div class="product-card" style="padding: 30px">
        <h2>เลือกระยะเวลาเช่า</h2>

        <div class="item-list" id="cart-summary"></div>

        <form id="detailForm">
          <div class="form-group">
            <label>วันที่รับอุปกรณ์ (Start Date) *</label>
            <input type="date" id="rd_start_date" required />
          </div>
          <div class="form-group">
            <label>วันที่คืนอุปกรณ์ (End Date) *</label>
            <input type="date" id="rd_end_date" required />
          </div>
          <button
            type="submit"
            class="rent-btn"
            style="background-color: #28a745"
          >
            บันทึกรายการ & ไปชำระเงิน ➔
          </button>
        </form>
      </div>
    </div>

    <script>
      const cartData = JSON.parse(localStorage.getItem("cartData")) || [];
      const rentalId = localStorage.getItem("currentRentalId");

      console.log("Current Rental ID from LocalStorage:", rentalId);

      if (!rentalId || rentalId === "undefined" || rentalId === "null") {
        alert(
          "ไม่พบข้อมูลบิลเช่าหลัก (Rental ID is missing) กรุณาทำรายการใหม่",
        );
        window.location.href = "index.html";
      }

      // แสดงรายการในตะกร้า
      const summaryDiv = document.getElementById("cart-summary");
      if (cartData.length > 0) {
        let html = "<ul style='padding-left: 20px; margin: 0;'>";
        cartData.forEach((item) => {
          html += `<li style='margin-bottom: 5px;'>${item.equip_brand} ${item.equip_model} (ID: ${item.equip_id})</li>`;
        });
        html += "</ul>";
        summaryDiv.innerHTML = html;
      } else {
        summaryDiv.innerHTML =
          "<p style='color:red;'>ไม่พบข้อมูลสินค้าในตะกร้า</p>";
      }

      document.getElementById("rd_start_date").valueAsDate = new Date();

      document
        .getElementById("detailForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const startDate = document.getElementById("rd_start_date").value;
          const endDate = document.getElementById("rd_end_date").value;

          try {
            // ยิง API วนลูปตามจำนวนของในตะกร้า
            for (let i = 0; i < cartData.length; i++) {
              const item = cartData[i];

              const detailPayload = {
                rd_start_date: startDate,
                rd_end_date: endDate,
                rental_id: parseInt(rentalId),
                equip_id: parseInt(item.equip_id),
              };

              if (isNaN(detailPayload.rental_id)) {
                throw new Error(
                  "รหัสการเช่า (Rental ID) ไม่ถูกต้อง กรุณาเริ่มทำรายการใหม่",
                );
              }

              const response = await fetch(
                "http://localhost:3000/add-rental-detail",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(detailPayload),
                },
              );

              if (!response.ok) {
                const err = await response.json();
                throw new Error(`ชิ้นที่ ${i + 1} Error: ${err.errorDetail}`);
              }
            }

            alert("บันทึกรายการอุปกรณ์ทั้งหมดสำเร็จ! ไปหน้าชำระเงินกันเลย");
            window.location.href = "payment.html";
          } catch (error) {
            alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + error.message);
          }
        });
    </script>
  </body>
</html>
